services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mcp-docs-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-mcp_docs_rag}
      POSTGRES_USER: ${PGUSER:-mcp}
      POSTGRES_PASSWORD: ${PGPASSWORD:-mcp}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
